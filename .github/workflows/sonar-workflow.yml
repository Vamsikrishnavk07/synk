name: Run SonarQube with Maven
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'
        cache: maven
    - name: Build with Maven cloud
      run:  mvn -B verify sonar:sonar -Dsonar.projectKey=vamsikrishnavk07 -Dsonar.organization=testtraininggs -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=fc17c9a3d838881bf92f9835114e9b598a4a003b
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
